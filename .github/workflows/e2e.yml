name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create E2E environment
        run: |
          cat > .env <<'EOF'
          APP_ENV=e2e
          VITE_APP_ENV=e2e
          FRONTEND_ORIGIN=http://localhost:5173
          DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/rag_service
          VITE_API_BASE_URL=/api
          VITE_CLERK_PUBLISHABLE_KEY=
          CLERK_JWT_PUBLIC_KEY=
          CLERK_AUTHORIZED_PARTIES=http://localhost:5173
          S3_ENDPOINT_URL=http://minio:9000
          S3_ACCESS_KEY=minioadmin
          S3_SECRET_KEY=minioadmin
          S3_BUCKET=rag-service-documents
          S3_REGION=us-east-1
          S3_SECURE=false
          OPENAI_API_KEY=e2e-dummy-key
          INGESTION_POLL_INTERVAL_SECONDS=1
          INGESTION_MAX_RETRIES=2
          RETRIEVAL_TOP_K=3
          EOF

      - name: Start E2E stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
