name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start E2E stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
